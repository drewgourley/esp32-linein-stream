# Board: Waveshare ESP32-S3-ETH (Waveshare)
# Definition: definitions/boards/waveshare-esp32-s3-eth/manifest.yaml

esphome:
  name: tasting-room-sendspin-hub
  friendly_name: Tasting Room Sendspin Hub

esp32:
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz
    
external_components:
  - source:
      type: git
      url: https://github.com/drewgourley/esp32-linein-stream
      path: components
    refresh: 0s
    
logger:

api:

ota:
  - platform: esphome

ethernet:
  clk_pin: GPIO13
  clock_speed: 25MHz
  cs_pin: GPIO14
  interrupt_pin: GPIO10
  miso_pin: GPIO12
  mosi_pin: GPIO11
  reset_pin: GPIO9
  type: W5500

mdns:

sendspin:
  id: sendspin_hub
  task_stack_in_psram: false

i2s_audio:
  - id: i2s_audio_bus
    i2s_lrclk_pin: GPIO16
    i2s_bclk_pin: GPIO15

speaker:
  - platform: i2s_audio
    id: tasting_room_speaker
    sample_rate: 48000
    i2s_dout_pin: GPIO18
    i2s_audio_id: i2s_audio_bus
    dac_type: external
    channel: stereo
    use_apll: true

media_source:
  - platform: sendspin
    id: sendspin_media_source

media_player:
  - platform: sendspin
    id: tasting_room_sendspin_hub
    name: Tasting Room Sendspin Hub

  - platform: speaker_source
    id: external_media_player
    name: Tasting Room Sendspin Hub Source

    media_pipeline:
      format: FLAC
      num_channels: 2
      sample_rate: 48000
      speaker: tasting_room_speaker
      sources:
        - sendspin_media_source
    volume_increment: 0.05
    volume_min: 0.05
    volume_max: 1.00

linein_stream:
  id: linein_streamer
  bclk_pin: GPIO3
  lrclk_pin: GPIO2
  din_pin: GPIO17
  i2s_mode: master
  i2s_port: 1
  mclk_pin: GPIO1
  mclk_multiple: 256
  i2s_format: philips
  sample_rate: 48000
  gain: 1.0
  channels: 2
  port: 8080
  equalizer:
    - type: low_shelf
      frequency: 100
      q: 0.707
      gain: 0
    - type: peaking
      frequency: 1000
      q: 0.9
      gain: 0
    - type: high_shelf
      frequency: 10000
      q: 0.707
      gain: 0

number:
  - platform: template
    name: "Line-In Gain"
    id: linein_gain
    icon: "mdi:volume-high"
    unit_of_measurement: "dB"
    mode: slider
    optimistic: true
    restore_value: true
    initial_value: 12
    min_value: -6
    max_value: 30
    step: 0.5
    set_action:
      - lambda: "id(linein_streamer).set_gain(powf(10.0f, x / 20.0f));"

  - platform: template
    name: "EQ Bass"
    id: eq_bass
    icon: "mdi:equalizer"
    unit_of_measurement: "dB"
    mode: slider
    optimistic: true
    restore_value: true
    initial_value: 0
    min_value: -12
    max_value: 12
    step: 0.5
    set_action:
      - lambda: "id(linein_streamer).set_band_gain(0, x);"

  - platform: template
    name: "EQ Mid"
    id: eq_mid
    icon: "mdi:equalizer"
    unit_of_measurement: "dB"
    mode: slider
    optimistic: true
    restore_value: true
    initial_value: 0
    min_value: -12
    max_value: 12
    step: 0.5
    set_action:
      - lambda: "id(linein_streamer).set_band_gain(1, x);"

  - platform: template
    name: "EQ Treble"
    id: eq_treble
    icon: "mdi:equalizer"
    unit_of_measurement: "dB"
    mode: slider
    optimistic: true
    restore_value: true
    initial_value: 0
    min_value: -12
    max_value: 12
    step: 0.5
    set_action:
      - lambda: "id(linein_streamer).set_band_gain(2, x);"
